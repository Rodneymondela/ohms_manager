{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0">Add Health Record</h5>
                </div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('health_add') }}">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label for="employee_id" class="form-label">Employee *</label>
                                    <select class="form-select" id="employee_id" name="employee_id" required>
                                        <option value="">Select Employee</option>
                                        {% for employee in employees %}
                                        <option value="{{ employee.id }}">{{ employee.name }} ({{ employee.department }})</option>
                                        {% endfor %}
                                    </select>
                                </div>
                                
                                <div class="form-group mb-3">
                                    <label for="test_type" class="form-label">Test Type *</label>
                                    <select class="form-select" id="test_type" name="test_type" required>
                                        <option value="">Select Test Type</option>
                                        <option value="Physical Examination">Physical Examination</option>
                                        <option value="Blood Test">Blood Test</option>
                                        <option value="Hearing Test">Hearing Test</option>
                                        <option value="Vision Test">Vision Test</option>
                                        <option value="Respiratory Test">Respiratory Test</option>
                                        <option value="X-Ray">X-Ray</option>
                                        <option value="Other">Other</option>
                                    </select>
                                </div>
                                
                                <div class="form-group mb-3">
                                    <label for="result" class="form-label">Result *</label>
                                    <select class="form-select" id="result" name="result" required>
                                        <option value="">Select Result</option>
                                        <option value="Normal">Normal</option>
                                        <option value="Abnormal">Abnormal</option>
                                        <option value="Negative">Negative</option>
                                        <option value="Positive">Positive</option>
                                        <option value="Clear">Clear</option>
                                        <option value="Follow-up Required">Follow-up Required</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label for="date" class="form-label">Test Date *</label>
                                    <input type="date" class="form-control" id="date" name="date" 
                                           value="{{ datetime.utcnow().strftime('%Y-%m-%d') }}" required>
                                </div>
                                
                                <div class="form-group mb-3">
                                    <label for="next_test_date" class="form-label">Next Test Date</label>
                                    <input type="date" class="form-control" id="next_test_date" name="next_test_date">
                                </div>
                                
                                <div class="form-group mb-3">
                                    <label for="physician" class="form-label">Physician</label>
                                    <input type="text" class="form-control" id="physician" name="physician">
                                </div>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label for="facility" class="form-label">Facility</label>
                                    <input type="text" class="form-control" id="facility" name="facility">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label for="details" class="form-label">Details</label>
                                    <textarea class="form-control" id="details" name="details" rows="3"></textarea>
                                </div>
                            </div>
                        </div>
                        
                        <div class="form-group mt-4">
                            <button type="submit" class="btn btn-success">
                                <i class="fas fa-save"></i> Save Health Record
                            </button>
                            <a href="{{ url_for('health_list') }}" class="btn btn-secondary">
                                <i class="fas fa-times"></i> Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Set minimum date for next test date to be after test date
    const dateInput = document.getElementById('date');
    const nextTestInput = document.getElementById('next_test_date');
    
    dateInput.addEventListener('change', function() {
        nextTestInput.min = this.value;
    });
});
</script>
{% endblock %}
