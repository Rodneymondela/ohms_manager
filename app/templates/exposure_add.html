{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="card shadow">
                <div class="card-header bg-warning text-dark">
                    <h5 class="mb-0">Record New Exposure</h5>
                </div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('exposure_add') }}">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label for="employee_id" class="form-label">Employee *</label>
                                    <select class="form-select" id="employee_id" name="employee_id" required>
                                        <option value="">Select Employee</option>
                                        {% for employee in employees %}
                                        <option value="{{ employee.id }}">{{ employee.name }} ({{ employee.department }})</option>
                                        {% endfor %}
                                    </select>
                                </div>
                                
                                <div class="form-group mb-3">
                                    <label for="hazard_id" class="form-label">Hazard *</label>
                                    <select class="form-select" id="hazard_id" name="hazard_id" required>
                                        <option value="">Select Hazard</option>
                                        {% for hazard in hazards %}
                                        <option value="{{ hazard.id }}" data-unit="{{ hazard.unit }}"
                                                data-limit="{{ hazard.exposure_limit }}">
                                            {{ hazard.name }} ({{ hazard.category }})
                                        </option>
                                        {% endfor %}
                                    </select>
                                </div>
                                
                                <div class="form-group mb-3">
                                    <label for="exposure_level" class="form-label">Exposure Level *</label>
                                    <div class="input-group">
                                        <input type="number" step="0.01" class="form-control" 
                                               id="exposure_level" name="exposure_level" required>
                                        <span class="input-group-text" id="unit-display">-</span>
                                    </div>
                                    <div id="limit-warning" class="text-danger d-none">
                                        Warning: Exceeds recommended limit of <span id="limit-value"></span>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label for="date" class="form-label">Exposure Date *</label>
                                    <input type="date" class="form-control" id="date" name="date" 
                                           value="{{ datetime.utcnow().strftime('%Y-%m-%d') }}" required>
                                </div>
                                
                                <div class="form-group mb-3">
                                    <label for="duration" class="form-label">Duration (hours)</label>
                                    <input type="number" step="0.1" class="form-control" 
                                           id="duration" name="duration">
                                </div>
                                
                                <div class="form-group mb-3">
                                    <label for="location" class="form-label">Location</label>
                                    <input type="text" class="form-control" id="location" name="location">
                                </div>
                            </div>
                        </div>
                        
                        <div class="form-group mb-3">
                            <label for="notes" class="form-label">Notes</label>
                            <textarea class="form-control" id="notes" name="notes" rows="3"></textarea>
                        </div>
                        
                        <div class="form-group mt-4">
                            <button type="submit" class="btn btn-warning text-dark">
                                <i class="fas fa-save"></i> Save Exposure Record
                            </button>
                            <a href="{{ url_for('exposure_list') }}" class="btn btn-secondary">
                                <i class="fas fa-times"></i> Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const hazardSelect = document.getElementById('hazard_id');
    const unitDisplay = document.getElementById('unit-display');
    const exposureInput = document.getElementById('exposure_level');
    const limitWarning = document.getElementById('limit-warning');
    const limitValue = document.getElementById('limit-value');
    
    hazardSelect.addEventListener('change', function() {
        const selectedOption = this.options[this.selectedIndex];
        const unit = selectedOption.getAttribute('data-unit');
        const limit = selectedOption.getAttribute('data-limit');
        
        unitDisplay.textContent = unit || '-';
        limitValue.textContent = limit ? limit + ' ' + unit : '';
    });
    
    exposureInput.addEventListener('input', function() {
        const selectedHazard = hazardSelect.options[hazardSelect.selectedIndex];
        const limit = parseFloat(selectedHazard.getAttribute('data-limit'));
        const currentValue = parseFloat(this.value);
        
        if (!isNaN(limit) && !isNaN(currentValue) && currentValue > limit) {
            limitWarning.classList.remove('d-none');
        } else {
            limitWarning.classList.add('d-none');
        }
    });
});
</script>
{% endblock %}
